networks:
  vps_network:
    external: true

services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: account_c
    env_file:
      - .env
    ports:
      - "${APP_PORT}:${APP_PORT}"
    networks:
      - vps_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

